services:
  - type: web
    name: ieu-cepa-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
    disk:
      name: chroma-data
      mountPath: /opt/render/project/src/backend/chroma_db
      sizeGB: 1
